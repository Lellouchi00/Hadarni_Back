<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekrili · Password Reset Successful</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #faf5ff 0%, #f3e8ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -10px rgba(106, 13, 173, 0.2), 0 0 0 1px rgba(255,255,255,0.5) inset;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 2rem;
        }
        
        .logo-container svg {
            width: 140px;
            height: auto;
        }

        .ekrili-logo-text {
            fill: #2d1b3c;
            font-weight: 700;
            font-size: 32px;
        }
        
        .ekrili-dot {
            fill: #8a2be2;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #f0e6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-icon i {
            font-size: 40px;
            color: #8a2be2;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d1b3c;
            margin-bottom: 1rem;
        }

        .message {
            color: #6b4f8a;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            background: #8a2be2;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 18px -8px rgba(138, 43, 226, 0.5);
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }

        .btn:hover {
            background: #7126b5;
            transform: scale(1.02);
        }

        .footer-badges {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #8a6fb0;
            letter-spacing: 0.3px;
        }

        .footer-badges i {
            margin-right: 4px;
            color: #b77ef0;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin: 2rem 0 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e9d9ff;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d1b3c;
        }
        
        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 0.4px;
            color: #8a6fb0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- شعار Ekrili -->
        <div class="logo-container">
            <svg width="140" height="48" viewBox="0 0 140 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="36" class="ekrili-logo-text" font-family="Inter, sans-serif" font-weight="700" font-size="34">ekrili</text>
                <circle cx="112" cy="24" r="8" class="ekrili-dot" fill="#8a2be2"/>
            </svg>
        </div>

        <!-- أيقونة النجاح -->
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>

        <!-- عنوان النجاح -->
        <h1>Password Reset Successful!</h1>
        
        <!-- رسالة النجاح -->
        <div class="message">
            Your password has been successfully reset. You can now log in to your account with your new password.
        </div>

        <!-- زر الذهاب لتسجيل الدخول -->
        <a href="/user/login" class="btn">
            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
            Go to Login
        </a>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat">
                <span class="stat-number">12k+</span>
                <span class="stat-label">ACTIVE LISTINGS</span>
            </div>
            <div class="stat">
                <span class="stat-number">98%</span>
                <span class="stat-label">MATCH RATE</span>
            </div>
            <div class="stat">
                <span class="stat-number">24/7</span>
                <span class="stat-label">SUPPORT</span>
            </div>
        </div>

        <!-- شارات الأمان -->
        <div class="footer-badges">
            <span><i class="fas fa-lock"></i> SECURE SSL</span>
            <span><i class="fas fa-check-circle"></i> GDPR READY</span>
        </div>
    </div>
</body>
</html>
