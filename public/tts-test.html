<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px; width: 520px; max-width: 90vw; }
  h1 { font-size: 20px; margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  textarea, select { width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 14px; font-family: inherit; }
  textarea { resize: vertical; min-height: 100px; }
  select { background: #fff; }
  button { margin-top: 18px; width: 100%; padding: 12px; background: #0066ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #0052cc; }
  .result { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
  .result.error { display: block; background: #fff0f0; color: #c00; }
  .result.success { display: block; background: #f0faf0; color: #070; }
  .result.info { display: block; background: #f0f5ff; color: #005; }
  audio { margin-top: 12px; width: 100%; display: none; }
  .spinner { display: none; width: 18px; height: 18px; border: 3px solid #ddd; border-top-color: #0066ff; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .spinner { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1> Text-to-Speech Test</h1>

  <label for="text">Text</label>
  <textarea id="text" placeholder="Type something...">Hello, welcome to the English test. Let's begin.</textarea>

  <label for="voice">Voice</label>
  <select id="voice"></select>

  <div class="loading"><div class="spinner"></div></div>
  <button id="generateBtn">Generate & Play</button>

  <div class="result" id="result"></div>
  <audio id="player" controls></audio>
</div>

<script>
const textEl = document.getElementById("text");
const voiceEl = document.getElementById("voice");
const btn = document.getElementById("generateBtn");
const resultEl = document.getElementById("result");
const player = document.getElementById("player");

const VOICES = [
  { key: "teacher", label: "Teacher (Aria)" },
  { key: "male",    label: "Male (Guy)" },
  { key: "female",  label: "Female (Jenny)" },
  { key: "narrator",label: "Narrator (Ryan)" },
  { key: "child",   label: "Child (Ana)" },
  { key: "exam",    label: "Exam (Aria)" },
];

VOICES.forEach(v => {
  const opt = document.createElement("option");
  opt.value = v.key;
  opt.textContent = v.label;
  voiceEl.appendChild(opt);
});

btn.addEventListener("click", async () => {
  const text = textEl.value.trim();
  if (!text) { showResult("Please enter some text.", "error"); return; }

  const voice = voiceEl.value;
  btn.disabled = true;
  btn.classList.add("loading");
  hideResult();
  player.style.display = "none";

  try {
    const url = `/test/audio/raw?text=${encodeURIComponent(text)}&voice=${encodeURIComponent(voice)}`;
    const res = await fetch(url);

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      showResult(err.error || "Request failed", "error");
      return;
    }

    const blob = await res.blob();
    const audioUrl = URL.createObjectURL(blob);

    player.src = audioUrl;
    player.style.display = "block";
    player.play().catch(() => {});
    showResult(`Audio generated (${(blob.size / 1024).toFixed(1)} KB, voice: ${voice})`, "success");
  } catch (err) {
    showResult(err.message, "error");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
});

function showResult(msg, type) {
  resultEl.className = "result " + type;
  resultEl.textContent = msg;
  resultEl.style.display = "block";
}
function hideResult() {
  resultEl.style.display = "none";
}
</script>
</body>
</html>
